name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.actor != 'github-actions[bot]' &&
      !endsWith(github.actor, '[bot]') &&
      github.event.comment.user.type != 'Bot' &&
      !endsWith(github.event.comment.user.login, '[bot]') &&
      (
        github.event.comment.body == '/oc' ||
        startsWith(github.event.comment.body, '/oc ') ||
        startsWith(github.event.comment.body, format('/oc{0}', fromJSON('"\n"'))) ||
        endsWith(github.event.comment.body, ' /oc') ||
        endsWith(github.event.comment.body, format('{0}/oc', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, ' /oc ') ||
        contains(github.event.comment.body, format(' /oc{0}', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, format('{0}/oc ', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, format('{0}/oc{1}', fromJSON('"\n"'), fromJSON('"\n"'))) ||
        github.event.comment.body == '/opencode' ||
        startsWith(github.event.comment.body, '/opencode ') ||
        startsWith(github.event.comment.body, format('/opencode{0}', fromJSON('"\n"'))) ||
        endsWith(github.event.comment.body, ' /opencode') ||
        endsWith(github.event.comment.body, format('{0}/opencode', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, ' /opencode ') ||
        contains(github.event.comment.body, format(' /opencode{0}', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, format('{0}/opencode ', fromJSON('"\n"'))) ||
        contains(github.event.comment.body, format('{0}/opencode{1}', fromJSON('"\n"'), fromJSON('"\n"')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: opencode-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/kimi-k2.6
