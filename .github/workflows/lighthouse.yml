name: lighthouse

on:
  schedule:
    - cron: '43 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: lighthouse-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Lighthouse
        run: |
          mkdir -p reports/lighthouse
          npx --yes lighthouse https://calls-calendar-frontend-09gz.onrender.com/ \
            --preset=desktop \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output=html \
            --output-path=reports/lighthouse/lighthouse

      - name: Generate Lighthouse summary
        run: node scripts/lighthouse-summary.mjs

      - name: Verify Lighthouse output
        run: |
          test -s reports/lighthouse/lighthouse.report.html
          test -s reports/lighthouse/lighthouse.report.json
          test -s reports/lighthouse/lighthouse-summary.md

      - name: Publish Lighthouse summary
        if: always()
        run: |
          if [ -s reports/lighthouse/lighthouse-summary.md ]; then
            cat reports/lighthouse/lighthouse-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Lighthouse summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: reports/lighthouse/
          retention-days: 14
