name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: tests-${{ github.ref }}
      cancel-in-progress: true
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --user 1001

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace tests
        run: pnpm test

      - name: Run e2e tests
        run: pnpm test:e2e
